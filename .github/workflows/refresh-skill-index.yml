# The `name:` below is referenced by release.yml's workflow_run trigger — keep in sync.
name: Refresh skill index

# Continuous extraction of the bundled Guild Wars Wiki skill index.
# src/skills.generated.ts is derived from the wiki's machine-readable skill
# list plus per-skill categories/infoboxes (never game files), so it drifts
# when the wiki is edited. This workflow re-extracts on a schedule, validates
# the result, and commits it only when the underlying data actually changed.

on:
  schedule:
    # Weekly, Mondays 07:00 UTC.
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      commit:
        description: "Commit refreshed data if it changed"
        type: boolean
        default: true

permissions:
  contents: write

# Shares release.yml's group so a refresh never runs concurrently with a
# release (whose push has no rebase) or with another refresh.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # skills:check compares a content hash of the extracted data (ignoring
      # extraction timestamp and revision metadata), so an unchanged wiki never
      # produces a no-op commit. Exit 10 means "data changed"; any other
      # nonzero exit is a crashed extraction and fails the job instead of
      # being mistaken for a change.
      - name: Detect upstream changes
        id: diff
        run: |
          set +e
          npm run --silent skills:check
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          elif [ "$code" -eq 10 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "skills:check failed with exit $code" >&2
            exit "$code"
          fi

      - name: Rebuild skill index
        if: steps.diff.outputs.changed == 'true'
        run: |
          npm run skills:build
          git --no-pager diff --stat -- src/skills.generated.ts

      # Validate the freshly-generated index before it can be committed, so a
      # bad extraction never lands on main.
      - name: Typecheck
        if: steps.diff.outputs.changed == 'true'
        run: npm run typecheck

      - name: Test
        if: steps.diff.outputs.changed == 'true'
        run: npm test

      - name: Commit refreshed index
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.commit != 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/skills.generated.ts
          rev=$(grep -o '"wikiRevisionId": [0-9]*' src/skills.generated.ts | grep -o '[0-9]*$' || echo unknown)
          sha=$(grep -o '"contentSha256": "[0-9a-f]*"' src/skills.generated.ts | grep -o '[0-9a-f]\{64\}' | cut -c1-12 || echo unknown)
          git commit -m "chore: refresh skill index from Guild Wars Wiki (rev ${rev}, sha ${sha})"
          # The branch may have moved during extraction (e.g. a human push;
          # workflow pushes are serialized by the concurrency group); rebase
          # our single generated-file commit onto the current tip and
          # re-validate the combined tree before pushing it.
          git pull --rebase origin "$GITHUB_REF_NAME"
          npm run typecheck && npm test
          git push
