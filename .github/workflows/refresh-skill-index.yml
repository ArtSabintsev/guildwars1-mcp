# The `name:` below is referenced by release.yml's workflow_run trigger — keep in sync.
name: Refresh skill index

# Continuous extraction of the bundled Guild Wars Wiki skill index.
# src/skills.generated.ts is derived from the wiki's machine-readable skill
# list plus per-skill categories/infoboxes (never game files), so it drifts
# when the wiki is edited. This workflow re-extracts on a schedule, validates
# the result, and commits it only when the underlying data actually changed.
#
# The wiki's AWS load balancer intermittently 403s hosted-runner egress IPs in
# block windows lasting minutes to hours (observed 2026-07-20: all endpoints
# 403 at once from awselb/2.0, then 200 minutes later; residential IPs
# unaffected). Mitigation, keeping the refresh fully automated:
#   - the extraction steps live in .github/actions/refresh-skill-index and run
#     twice — a failed first attempt retries once on a fresh runner (fresh IP);
#   - if both attempts land in a block window (script exit 99), the run skips
#     with a warning instead of failing, and the daily cron self-heals: any
#     open window across the week gets the refresh through.

on:
  schedule:
    # Daily 07:00 UTC — frequent draws against the wiki's intermittent
    # CI-IP block windows; an unchanged wiki makes each run a no-op.
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      commit:
        description: "Commit refreshed data if it changed"
        type: boolean
        default: true

permissions:
  contents: write

# Shares release.yml's group so a refresh never runs concurrently with a
# release (whose push has no rebase) or with another refresh.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # A first-attempt failure must not fail the run: release.yml only fires on
    # conclusion == success, and the retry below may still complete the
    # refresh. If the retry also fails, the run fails there.
    continue-on-error: true
    outputs:
      ok: ${{ steps.attempt.outputs.ok }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Refresh
        id: attempt
        uses: ./.github/actions/refresh-skill-index
        with:
          commit: ${{ github.event.inputs.commit || 'true' }}

  # Fresh runner = fresh egress IP; only runs when the first attempt failed.
  refresh-retry:
    needs: refresh
    if: needs.refresh.outputs.ok != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Refresh (retry on fresh runner)
        uses: ./.github/actions/refresh-skill-index
        with:
          commit: ${{ github.event.inputs.commit || 'true' }}
          # Second blocked attempt = we're in a block window; skip green and
          # let the next daily run retry rather than paging on a red X.
          blocked-policy: skip
